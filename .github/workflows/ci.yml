name: CI

on:
  push:
    branches: [ main, develop, 'feature/**', 'fix/**' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:        # allow manual runs from the Actions UI

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

permissions:
  contents: read
  actions: read
  checks: write
  
jobs:
  # ─────────────────────────────────────────────────────────────────────
  # build-and-test
  # Restores, builds, and runs all xUnit tests with code coverage.
  # ─────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # needed for accurate SemVer with GitVersion / MinVer

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Show computed version
        run: |
          dotnet tool install --global nbgv
          nbgv get-version
    
      # Cache NuGet packages to speed up subsequent runs.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore Aiel.slnx

      - name: Build (Release)
        run: dotnet build Aiel.slnx --configuration Release --no-restore

      - name: Run unit tests
        run: |
          dotnet test Aiel.slnx \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      - name: Publish test results
        uses: dorny/test-reporter@v3
        if: always()            # publish even on test failure
        with:
          name: xUnit Test Results
          path: ./TestResults/**/*.trx
          reporter: dotnet-trx
          fail-on-error: false
          fail-on-empty: false

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: ./TestResults/**/coverage.cobertura.xml
          flags: unittests
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────
  # pack
  # Produces NuGet packages for the analyzer and code-fix projects.
  # Only runs on pushes to main (not PRs) so packages aren't published
  # from feature branches.
  # ─────────────────────────────────────────────────────────────────────
  pack:
    name: Pack NuGet
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Aiel.slnx

      - name: Build (Release)
        run: dotnet build Aiel.slnx --configuration Release --no-restore

      - name: Pack Aiel.Logging.Analyzers
        run: |
          dotnet pack src/Aiel.Logging.Analyzers/Aiel.Logging.Analyzers.csproj \
            --configuration Release \
            --no-build \
            --output ./artifacts

      - name: Pack Aiel.Logging.CodeFixes
        run: |
          dotnet pack src/Aiel.Logging.CodeFixes/Aiel.Logging.CodeFixes.csproj \
            --configuration Release \
            --no-build \
            --output ./artifacts

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg
          retention-days: 30

      # Uncomment the step below and set NUGET_API_KEY in your repo secrets
      # to publish automatically on every merge to main.
      #
      # - name: Push to NuGet.org
      #   run: |
      #     dotnet nuget push ./artifacts/*.nupkg \
      #       --api-key ${{ secrets.NUGET_API_KEY }} \
      #       --source https://api.nuget.org/v3/index.json \
      #       --skip-duplicate
